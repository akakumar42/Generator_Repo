name: "Podcast Generator"
author: "Akash Kumar"
description: "Generate a feed for the podcast from a YAML file"
runs: 
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "green"
inputs:
  email:
    description: The Commiter's email
    required: True
    default: ${{ github.actor }}@localhost
  name:
    description: The committer's name
    required: True
    default: ${{ github.actor }}